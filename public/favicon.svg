<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark wood circle -->
  <circle cx="256" cy="256" r="256" fill="#1e1b17"/>
  <circle cx="256" cy="256" r="240" fill="#2a2520"/>
  <!-- Fretboard body -->
  <rect x="80" y="140" width="352" height="232" rx="8" fill="#3a3228" stroke="#4a4035" stroke-width="2"/>
  <!-- Fret wires -->
  <line x1="168" y1="140" x2="168" y2="372" stroke="#8a7d6a" stroke-width="3" opacity="0.7"/>
  <line x1="248" y1="140" x2="248" y2="372" stroke="#8a7d6a" stroke-width="3" opacity="0.7"/>
  <line x1="320" y1="140" x2="320" y2="372" stroke="#8a7d6a" stroke-width="3" opacity="0.7"/>
  <line x1="384" y1="140" x2="384" y2="372" stroke="#8a7d6a" stroke-width="3" opacity="0.7"/>
  <!-- Strings -->
  <line x1="80" y1="186" x2="432" y2="186" stroke="#e8e2d2" stroke-width="2" opacity="0.9"/>
  <line x1="80" y1="232" x2="432" y2="232" stroke="#e0d8c6" stroke-width="3" opacity="0.85"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#c8b68c" stroke-width="4" opacity="0.8"/>
  <line x1="80" y1="326" x2="432" y2="326" stroke="#b8a67c" stroke-width="5.5" opacity="0.75"/>
  <!-- Dot inlay at fret 3 -->
  <circle cx="284" cy="256" r="12" fill="#6b6155" opacity="0.5"/>
  <!-- Note circle (the "find this note" indicator) -->
  <circle cx="206" cy="232" r="28" fill="#d4922e"/>
  <text x="206" y="241" text-anchor="middle" fill="#1a1408" font-family="monospace" font-weight="bold" font-size="28">A</text>
</svg>
